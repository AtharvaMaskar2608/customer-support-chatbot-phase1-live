change: contracts-foundation

filesTouched:
  - pyproject.toml
  - uv.lock
  - .env.example
  - app/main.py
  - app/contracts/**
  - app/contracts/schema/chat_wire.schema.json
  - app/contracts/schema/tools.schema.json
  - app/finx/interfaces.py
  - app/finx/envelopes.py
  - app/finx/models.py
  - app/finx/__init__.py
  - app/llm/client.py
  - app/llm/__init__.py
  - app/config/**
  - app/store/__init__.py
  - app/store/schema.py
  - app/store/migrations/0001_conversation_store.sql
  - app/store/migrations/runner.py
  - tests/contracts/**
  - tests/finx/**
