doneCondition: >
  Hybrid retrieval (vector + FTS + RRF) returns the expected fused ranking against a
  seeded pgvector test DB, and grounded generation produces citation-bearing answers that
  refuse-and-escalate on the B3 numeric-gap and D4 no-match cases and refuse investment
  advice / resist prompt injection (C-series), all without a live LLM in CI. Retrieval
  runs against an ephemeral pgvector container seeded from a committed JSONL fixture;
  generation/refusal tests use a FakeRetriever and FakeLLMClient (no DB, no network).
